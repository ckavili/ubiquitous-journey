---
- apiVersion: monitoring.coreos.com/v1
  kind: ServiceMonitor
  metadata:
    name: argocd-mon
    labels:
      k8s-app: prometheus
  spec:
    namespaceSelector:
      matchNames:
      - labs-ci-cd
    selector:
      matchLabels:
        app.kubernetes.io/name: argocd-metrics
    endpoints:
    - port: metrics
      interval: 30s